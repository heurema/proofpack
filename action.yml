name: "Proofpack Verify"
description: "Verify proofpack artifact in PR"
inputs:
  mode:
    description: "Verification mode: warn or fail"
    required: false
    default: "fail"
  dry-run:
    description: "Validate bundle without writing summary.md"
    required: false
    default: "false"
  python-version:
    description: "Python version"
    required: false
    default: "3.14"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - run: pip install .
      shell: bash
    - run: proofpack verify --mode ${{ inputs.mode }} --json${{ inputs.dry-run == 'true' && ' --dry-run' || '' }}
      shell: bash
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: proofpack-summary
        path: .proofpack/summary.md
        retention-days: 30
