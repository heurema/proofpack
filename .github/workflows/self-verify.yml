name: Proofpack Self-Verify
on:
  pull_request:
    paths:
      - ".proofpack/**"
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install .
      - run: proofpack verify --mode fail
